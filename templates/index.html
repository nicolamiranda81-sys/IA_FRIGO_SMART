<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrigoSmart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F6F7;
    --surface:#FFFFFF;
    --border:#E1E6E8;
    --ink:#16242C;
    --ink-soft:#5C6B73;
    --ink-faint:#8A969C;
    --accent:#1E5F63;
    --accent-deep:#143F42;
    --hero-bg:#EFEAD9;
    --coral:#D8714A;
    --sage:#7FA06B;
    --amber:#D9A441;
    --paleblue:#6FA8AA;
    --cream:#FBF2DA;
    --casing:#123135;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: linear-gradient(135deg, #F4F6F7 0%, #E1E6E8 100%);
    background-attachment: fixed;
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .shell{
    max-width:920px;
    margin:0 auto;
    padding:0 20px 60px;
  }

  .hero{
    background:var(--hero-bg);
    margin:0 -20px 26px;
    padding:36px 20px;
    display:flex;
    align-items:center;
    gap:24px;
    border-radius:16px;
    box-shadow: 0 10px 30px rgba(22, 36, 44, 0.05);
  }
  .hero-text{ flex:1; min-width:200px; }
  .hero-eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--accent-deep);
    margin:0 0 8px;
  }
  .hero-text h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:38px;
    margin:0 0 10px;
    line-height:1.05;
    color:var(--casing);
  }
  .hero-sub{
    margin:0;
    font-size:14.5px;
    color:var(--ink-soft);
    max-width:320px;
    line-height:1.5;
  }
  .hero-art{ width:200px; flex-shrink:0; }
  .hero-art svg{ width:100%; height:auto; display:block; }
  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
  }
  .hero-art svg { animation: float 4s ease-in-out infinite; }
  @media (max-width:620px){
    .hero{ flex-direction:column; text-align:center; padding:30px 20px; }
    .hero-sub{ margin:0 auto; }
    .hero-art{ width:160px; }
  }

  .grid{
    display:grid;
    grid-template-columns:1.1fr 1fr;
    gap:18px;
  }
  @media (max-width:760px){
    .grid{ grid-template-columns:1fr; }
  }
  .panel{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
    box-shadow: 0 10px 30px rgba(22, 36, 44, 0.05);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .panel:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 35px rgba(22, 36, 44, 0.08);
  }
  .panel-head{
    padding:12px 16px;
    border-bottom:1px solid var(--border);
    font-size:12.5px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--ink-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .visual-body{
    position:relative;
    aspect-ratio:4/3;
    background:#0E1A1F;
  }
  .visual-body video {
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .visual-body img {
    width:100%;
    height:100%;
    object-fit:contain; /* Mostra la foto per intero senza tagliare i bordi! */
    display:block;
  }
  .actions{
    display:flex;
    gap:8px;
    padding:12px 16px;
    flex-wrap:wrap;
  }
  .btn{
    flex:1;
    min-width:120px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:13.5px;
    padding:10px 12px;
    border-radius:7px;
    cursor:pointer;
    text-align:center;
  }
  .btn:hover{ background:var(--bg); }
  .btn-primary{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .btn-primary:hover{ background:var(--accent-deep); }
  .btn-ghost{ flex:none; width:100%; }
  .btn-danger { color: #A6402C; border-color: #E0B3A5; }
  .btn-danger:hover { background: #fdf2f0; }
  input[type="file"]{ display:none; }
  
  .chat-body{
    height:330px;
    overflow-y:auto;
    padding:14px 16px;
  }
  .msg{
    margin:0 0 14px;
    font-size:14px;
    line-height:1.55;
    max-width:92%;
  }
  .msg-tag{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:var(--ink-faint);
    margin-bottom:3px;
  }
  .msg-user{ 
    margin-left:auto; 
    background: var(--accent); 
    color: white; 
    padding: 10px 14px; 
    border-radius: 14px 14px 0 14px; 
    box-shadow: 0 4px 10px rgba(30, 95, 99, 0.15); 
  }
  .msg-user .msg-tag{ color: rgba(255,255,255,0.7); text-align:right; }
  .msg-bot{ 
    background: white; 
    padding: 10px 14px; 
    border-radius: 14px 14px 14px 0; 
    border: 1px solid var(--border); 
    box-shadow: 0 4px 10px rgba(22, 36, 44, 0.05); 
    color: var(--ink); 
  }
  .msg-error{ background: #fdf2f0; padding: 10px 14px; border-radius: 14px; border: 1px solid #E0B3A5; color:#A6402C; }
  .msg-listening{ color:var(--accent); display:flex; align-items:center; gap:6px; }
  .dot{ width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 1s infinite ease-in-out; }
  @keyframes pulse{ 0%,100%{opacity:.3;} 50%{opacity:1;} }
  .mono{
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    background:var(--bg);
    border:1px solid var(--border);
    padding:1px 5px;
    border-radius:4px;
  }
  .chat-input{ display:flex; gap:8px; padding:12px 14px; border-top:1px solid var(--border); }
  .chat-input input{
    flex:1; border:1px solid var(--border); background:var(--bg);
    border-radius:7px; padding:9px 12px; font-family:'Inter', sans-serif;
    font-size:14px; color:var(--ink); outline:none;
  }
  .chat-input input:focus{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(30,95,99,0.14); }
  .send-btn{
    border:none; background: linear-gradient(135deg, var(--accent), var(--accent-deep)); color:#fff; border-radius:7px;
    padding:0 16px; font-weight:600; font-size:13.5px; cursor:pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 10px rgba(30, 95, 99, 0.2);
  }
  .send-btn:hover{ transform: translateY(-1px); box-shadow: 0 6px 12px rgba(30, 95, 99, 0.3); }
  .vol-row{ display:flex; justify-content:flex-end; padding:8px 16px 0; }
  .vol-btn{
    border:1px solid var(--border); background:transparent; color:var(--ink-soft);
    font-family:'IBM Plex Mono', monospace; font-size:10.5px; padding:4px 9px;
    border-radius:14px; cursor:pointer;
  }
  .vol-btn.is-off{ color:#A6402C; border-color:#E0B3A5; }
  button:focus-visible, input:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  
  /* Stili Inventario Frigo Reale */
  .fridge-wrapper {
    margin: 20px 0;
    border-radius: 16px;
    background: #e5e7eb;
    border: 15px solid #f3f4f6;
    border-bottom-width: 30px;
    position: relative;
    overflow: hidden;
    box-shadow: 
      0 20px 50px rgba(0,0,0,0.15),
      inset 0 0 0 5px #d1d5db,
      inset 15px 0 20px rgba(0,0,0,0.05),
      inset -15px 0 20px rgba(0,0,0,0.05);
    min-height: 450px;
    display: flex;
    flex-direction: column;
  }
  .fridge-wrapper::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border: 8px solid #9ca3af;
    border-radius: 4px;
    pointer-events: none;
    z-index: 10;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
  }
  .fridge-light {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    height: 80px;
    background: radial-gradient(ellipse at top, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 70%);
    pointer-events: none;
    z-index: 8;
  }
  .fridge-interior {
    background: linear-gradient(180deg, #d8e5e8 0%, #b9d0d8 100%);
    flex: 1;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 135px,
      rgba(255, 255, 255, 0.9) 135px,
      rgba(150, 180, 190, 0.4) 140px,
      rgba(255, 255, 255, 0.2) 145px,
      transparent 145px
    );
    background-size: 100% 145px;
    padding: 0 10px 140px 10px; /* Spazio per il cassetto in basso */
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    grid-auto-rows: 145px;
    position: relative;
    z-index: 4;
  }
  .inventory-item {
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.9);
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 10px 15px rgba(0,0,0,0.1);
    align-self: end;
    justify-self: center;
    margin-bottom: 12px;
    width: 90%;
    height: 100px;
    transition: all 0.3s ease;
  }
  .inventory-item::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: -10%;
    width: 80%;
    height: 6px;
    background: rgba(0,0,0,0.15);
    border-radius: 50%;
    filter: blur(2px);
    z-index: -1;
    transition: all 0.3s ease;
  }
  .inventory-item:hover {
    transform: translateY(-10px) scale(1.05);
    background: rgba(255, 255, 255, 0.95);
    border-color: #fff;
    box-shadow: 0 15px 25px rgba(111, 168, 170, 0.3);
  }
  .inventory-item:hover::after {
    transform: scale(0.8);
    opacity: 0.5;
  }
  .inventory-item span.nome {
    font-weight: 700;
    font-size: 14px;
    color: var(--ink);
    text-shadow: 0 1px 2px rgba(255,255,255,0.8);
  }
  .inventory-item span.quantita {
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    color: #fff;
    border-radius: 12px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 700;
    margin-top: 8px;
    box-shadow: 0 3px 8px rgba(30, 95, 99, 0.3);
  }
  .fridge-crisper {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 130px;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(10px);
    border-top: 4px solid rgba(255,255,255,0.9);
    display: flex;
    gap: 15px;
    padding: 15px;
    z-index: 5;
  }
  .crisper-drawer {
    flex: 1;
    background: rgba(255,255,255,0.3);
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 8px;
    box-shadow: inset 0 5px 15px rgba(0,0,0,0.05);
    position: relative;
  }
  .crisper-drawer::before {
    content: '';
    position: absolute;
    top: 15px; left: 50%; transform: translateX(-50%);
    width: 50%; height: 6px;
    background: rgba(255,255,255,0.8);
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  .cold-mist {
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 60%;
    background: linear-gradient(to top, rgba(255,255,255,0.8) 0%, transparent 100%);
    pointer-events: none;
    z-index: 6;
    animation: breath 4s ease-in-out infinite alternate;
  }
  @keyframes breath {
    0% { opacity: 0.2; transform: scaleY(1); }
    100% { opacity: 0.5; transform: scaleY(1.1); }
  }
  .empty-state {
    grid-column: 1 / -1;
    align-self: center;
    padding: 40px 20px;
    text-align: center;
    color: var(--ink-faint);
    font-size: 15px;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.5);
    border-radius: 12px;
    backdrop-filter: blur(5px);
    margin: 20px;
  }
  .glass-effect {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
</style>
</head>
<body>

<div class="shell">
  <section class="hero glass-effect">
    <div class="hero-text">
      <p class="hero-eyebrow">Assistente anti-spreco</p>
      <h1>FrigoSmart</h1>
      <p class="hero-sub">Scansiona il frigo, scopri cosa hai e cosa cucinare prima che scada.</p>
    </div>
    <div class="hero-art" aria-hidden="true">
      <svg viewBox="0 0 280 240" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="cavity"><rect x="34" y="26" width="212" height="188" rx="12"/></clipPath>
          <radialGradient id="glow" cx="50%" cy="20%" r="70%">
            <stop offset="0%" stop-color="#FFF8E6" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#FFF8E6" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <rect x="20" y="10" width="240" height="220" rx="20" fill="#123135"/>
        <rect x="244" y="70" width="8" height="70" rx="4" fill="#0B2326"/>
        <rect x="34" y="26" width="212" height="188" rx="12" fill="#FBF2DA"/>
        <g clip-path="url(#cavity)">
          <circle cx="140" cy="60" r="100" fill="url(#glow)"/>
          <rect x="34" y="118" width="212" height="6" fill="#D8CDA8"/>
          <rect x="34" y="176" width="212" height="6" fill="#D8CDA8"/>
          <circle cx="76" cy="100" r="18" fill="#D8714A"/>
          <rect x="72" y="78" width="4" height="10" fill="#123135"/>
          <polygon points="108,75 134,75 121,63" fill="#6FA8AA"/>
          <rect x="108" y="75" width="26" height="42" rx="3" fill="#6FA8AA"/>
          <circle cx="168" cy="104" r="7" fill="#FBF2DA" stroke="#123135" stroke-opacity="0.3"/>
          <circle cx="182" cy="104" r="7" fill="#FBF2DA" stroke="#123135" stroke-opacity="0.3"/>
          <circle cx="175" cy="93" r="7" fill="#FBF2DA" stroke="#123135" stroke-opacity="0.3"/>
          <circle cx="76" cy="160" r="6" fill="#7FA06B"/>
          <circle cx="86" cy="160" r="6" fill="#7FA06B"/>
          <circle cx="81" cy="151" r="6" fill="#7FA06B"/>
          <circle cx="81" cy="169" r="6" fill="#7FA06B"/>
          <polygon points="140,178 172,178 156,152" fill="#D9A441"/>
        </g>
      </svg>
    </div>
  </section>

  <div class="grid">
    <section class="panel glass-effect">
      <div class="panel-head">Scansione</div>
      <div class="visual-body" id="visualBody">
        <video id="videoElement" autoplay playsinline></video>
        <canvas id="canvasElement" style="display:none;"></canvas>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="eseguiScansione()">Scansiona</button>
        <label class="btn" for="fileInput" style="display:flex; align-items:center; justify-content:center;">Carica foto</label>
        <input type="file" id="fileInput" accept="image/*" onchange="gestisciCaricamento(event)">
      </div>
      <div class="actions" style="padding-top:0; display:none;" id="resetRow">
        <button class="btn btn-ghost" onclick="tornaAllaWebcam()">Nuova scansione (torna alla webcam)</button>
      </div>
    </section>

    <section class="panel glass-effect">
      <div class="panel-head">Assistente</div>
      <div class="vol-row">
        <button id="btnVolume" class="vol-btn" onclick="toggleVolume()">Audio acceso</button>
      </div>
      <div class="chat-body" id="chatBox">
        <p class="msg msg-bot"><span class="msg-tag">Assistente</span>Ciao! Scrivimi o scansiona il frigo per iniziare.</p>
      </div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Scrivi un messaggio..." onkeypress="gestisciInvio(event)">
        <button class="btn" style="flex:none; min-width:auto; padding:9px 12px;" onclick="avviaAscolto()" aria-label="Parla">🎤</button>
        <button class="send-btn" onclick="inviaMessaggio()">Invia</button>
      </div>
    </section>
  </div>

  <!-- NUOVA SEZIONE: GESTIONE DISPENSA -->
  <section class="panel glass-effect" style="margin-top: 18px;">
    <div class="panel-head">
      <span>Il tuo Frigorifero</span>
      <div style="display: flex; gap: 8px;">
        <button class="btn" style="padding: 4px 10px; font-size: 11px; min-width: 0;" onclick="caricaInventario()">🔄 Aggiorna</button>
        <button class="btn btn-danger" style="padding: 4px 10px; font-size: 11px; min-width: 0;" onclick="svuotaFrigo()">🗑️ Svuota Tutto</button>
      </div>
    </div>
    <div class="fridge-wrapper">
      <div class="fridge-light"></div>
      <div id="inventarioContainer" style="display: flex; flex: 1; flex-direction: column;">
        <div class="fridge-interior">
          <div class="empty-state">
            Clicca su "Aggiorna" per visualizzare gli alimenti salvati.
          </div>
        </div>
      </div>
      <div class="fridge-crisper">
        <div class="crisper-drawer"></div>
        <div class="crisper-drawer"></div>
      </div>
      <div class="cold-mist"></div>
    </div>
  </section>
</div>

<script>
  const chatBox = document.getElementById("chatBox");
  const chatInput = document.getElementById("chatInput");
  const canvasElement = document.getElementById("canvasElement");
  const visualBody = document.getElementById("visualBody");
  const resetRow = document.getElementById("resetRow");
  let volumeOn = true;
  let cameraStream = null;

  function formattaTesto(testo){
    return testo.replace(/\b\d{4}-\d{2}-\d{2}\b/g, m => `<span class="mono">${m}</span>`);
  }

  async function avviaFotocamera() {
    const v = document.getElementById("videoElement");
    if (!v) return;
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      v.srcObject = cameraStream;
    } catch (err) {
      chatBox.innerHTML += `<p class="msg msg-error"><span class="msg-tag">Fotocamera</span>Non disponibile. Controlla i permessi.</p>`;
    }
  }
  window.onload = () => {
    avviaFotocamera();
    caricaInventario(); // Carica inventario all'avvio
  };

  function toggleVolume() {
    volumeOn = !volumeOn;
    const btn = document.getElementById("btnVolume");
    btn.textContent = volumeOn ? "Audio acceso" : "Audio spento";
    btn.classList.toggle("is-off", !volumeOn);
  }

  function gestisciInvio(event) {
    if (event.key === "Enter") inviaMessaggio();
  }

  async function inviaMessaggio() {
    const testo = chatInput.value.trim();
    if (!testo) return;

    chatBox.innerHTML += `<p class="msg msg-user"><span class="msg-tag">Tu</span>${testo}</p>`;
    chatInput.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;

    const risposta = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: testo, volumeOn: false })
    });

    const dati = await risposta.json();
    chatBox.innerHTML += `<p class="msg msg-bot"><span class="msg-tag">Assistente</span>${formattaTesto(dati.reply)}</p>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    parlaDalTelefono(dati.reply);
  }

  async function inviaImmagineAlServer(imageData) {
    chatBox.innerHTML += `<p class="msg msg-bot"><span class="msg-tag">Assistente</span>Scansione in corso...</p>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
      const risposta = await fetch('/scansiona', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: imageData, volumeOn: false })
      });
      const dati = await risposta.json();

      chatBox.innerHTML += `<p class="msg msg-bot"><span class="msg-tag">Assistente</span>${formattaTesto(dati.message)}</p>`;
      chatBox.scrollTop = chatBox.scrollHeight;

      if (dati.processedImage) {
        mostraRisultato(dati.processedImage);
      }
      parlaDalTelefono(dati.message);
      
      // Aggiorna l'inventario in basso automaticamente dopo la scansione
      setTimeout(caricaInventario, 1000);

    } catch (errore) {
      chatBox.innerHTML += `<p class="msg msg-error"><span class="msg-tag">Scansione</span>Non riuscita. Controlla la connessione.</p>`;
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  }

  function mostraRisultato(immagineBase64) {
    visualBody.innerHTML = `<img src="${immagineBase64}" alt="Risultato scansione">`;
    resetRow.style.display = "flex";
  }

  function tornaAllaWebcam() {
    visualBody.innerHTML = `<video id="videoElement" autoplay playsinline></video><canvas id="canvasElement" style="display:none;"></canvas>`;
    resetRow.style.display = "none";
    avviaFotocamera();
  }

  async function eseguiScansione() {
    const v = document.getElementById("videoElement");
    if (!v || !v.videoWidth) {
      chatBox.innerHTML += `<p class="msg msg-error"><span class="msg-tag">Scansione</span>Webcam non attiva.</p>`;
      return;
    }
    canvasElement.width = v.videoWidth;
    canvasElement.height = v.videoHeight;
    const ctx = canvasElement.getContext('2d');
    ctx.drawImage(v, 0, 0, canvasElement.width, canvasElement.height);
    const imageData = canvasElement.toDataURL('image/jpeg');
    inviaImmagineAlServer(imageData);
  }

  function gestisciCaricamento(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      visualBody.innerHTML = `<img src="${e.target.result}" style="filter: brightness(0.7);">`;
      resetRow.style.display = "flex";
      inviaImmagineAlServer(e.target.result);
    };
    reader.readAsDataURL(file);
    event.target.value = "";
  }

  // --- NUOVE FUNZIONI INVENTARIO ---
  async function caricaInventario() {
    const container = document.getElementById("inventarioContainer");
    try {
      const res = await fetch('/api/inventario');
      const data = await res.json();
      
      let html = '<div class="fridge-interior">';
      if (data.alimenti && data.alimenti.length > 0) {
        data.alimenti.forEach(item => {
          html += `
            <div class="inventory-item">
              <span class="nome">${item.nome}</span>
              <span class="quantita">Q.tà: ${item.quantita}</span>
            </div>
          `;
        });
      } else {
        html += '<div class="empty-state">Il frigo è vuoto. Fai una scansione per aggiungere alimenti!</div>';
      }
      html += '</div>';
      container.innerHTML = html;
    } catch(e) {
      container.innerHTML = '<div class="fridge-interior"><div class="empty-state" style="color: #A6402C;">Errore nel caricamento dell\'inventario.</div></div>';
    }
  }

  async function svuotaFrigo() {
    if (!confirm("Sei sicuro di voler svuotare completamente il frigorifero?")) return;
    
    try {
      await fetch('/api/svuota', { method: 'POST' });
      chatBox.innerHTML += `<p class="msg msg-bot"><span class="msg-tag">Assistente</span>Ho svuotato il frigorifero come richiesto.</p>`;
      chatBox.scrollTop = chatBox.scrollHeight;
      caricaInventario();
    } catch(e) {
      alert("Errore durante l'operazione.");
    }
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition;
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'it-IT';
    recognition.interimResults = false;

    recognition.onresult = function(event) {
      const testoAscoltato = event.results[0][0].transcript;
      chatInput.value = testoAscoltato;
      inviaMessaggio();
    };

    recognition.onerror = function(event) {
      chatBox.innerHTML += `<p class="msg msg-error"><span class="msg-tag">Microfono</span>Errore: ${event.error}</p>`;
    };
  }

  function avviaAscolto() {
    if (recognition) {
      chatBox.innerHTML += `<p class="msg msg-listening"><span class="dot"></span>In ascolto...</p>`;
      chatBox.scrollTop = chatBox.scrollHeight;
      recognition.start();
    } else {
      alert("Il tuo browser non supporta il microfono.");
    }
  }

  function parlaDalTelefono(testo) {
    if (!volumeOn) return;
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const sintesi = new SpeechSynthesisUtterance(testo);
      sintesi.lang = 'it-IT';
      window.speechSynthesis.speak(sintesi);
    }
  }
</script>
</body>
</html>
